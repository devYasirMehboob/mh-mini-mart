name: Deploy Backend to Hostinger

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**' # Ye action sirf tab chalega jab backend folder mein koi change hoga

jobs:
  deploy-backend:
    name: Deploy PHP Backend
    runs-on: ubuntu-latest

    steps:
      # Step 1: Repository se code fetch karega
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Backend files ko Hostinger par FTP se upload karega
      # database.local.php gitignore mein hai - kabhi upload nahi hogi
      # Wo file sirf Hostinger par manually bani rahegi
      - name: Deploy Backend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/
          server-dir: /public_html/api/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/backups/*.sql
            **/config/database.local.php
